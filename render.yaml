services:
  - type: web
    name: maria-bot
    runtime: node
    region: frankfurt
    plan: free

    buildCommand: npm install && npm run build
    startCommand: npm start

    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: BOT_TOKEN
        sync: false          # задаётся вручную в Dashboard → Environment
      - key: ANTHROPIC_KEY
        sync: false
      - key: WEBHOOK_URL
        sync: false          # https://<your-app-name>.onrender.com
      - key: MINI_APP_URL
        sync: false          # тот же URL что и WEBHOOK_URL
